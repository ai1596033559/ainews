name: 每日飞书推送

on:
  schedule:
    # 每天早上 8:00 北京时间 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发
    inputs:
      mode:
        description: '运行模式 (ai / tcm / pet / test)'
        required: false
        default: 'test'

jobs:
  push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [ai, tcm, pet]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 运行 ${{ matrix.task }} 任务
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node index.js ${{ matrix.task }}
